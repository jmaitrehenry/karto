<svg width="100%" viewBox="0 0 440 440" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Karto</title>

  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0D3299"/>
      <stop offset="100%" stop-color="#360D90"/>
    </linearGradient>
    <linearGradient id="hg" x1="50%" y1="0%" x2="50%" y2="100%" gradientUnits="userSpaceOnUse">
      <stop offset="0%"  stop-color="#2196F6"/>
      <stop offset="40%" stop-color="#4A6CF7"/>
      <stop offset="100%" stop-color="#6B3AED"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="440" height="440" rx="88" ry="88" fill="url(#bg)"/>

  <!-- Dark heptagon fill -->
  <polygon points="220,45 356.8,110.9 390.6,258.9 295.9,377.7 144.1,377.7 49.4,258.9 83.2,110.9" fill="#0A1628"/>

  <!-- Heptagon border segments (35% from each vertex) -->
  <path d="M267.9,68.1 L220,45 L172.1,68.1"   fill="none" stroke="url(#hg)" stroke-width="22" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M309.0,87.8 L356.8,110.9 L368.6,162.7" fill="none" stroke="url(#hg)" stroke-width="22" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M378.8,207.1 L390.6,258.9 L295.9,377.7 L242.8,377.7" fill="none" stroke="url(#hg)" stroke-width="22" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M197.2,377.7 L144.1,377.7 L49.4,258.9 L61.2,207.1"  fill="none" stroke="url(#hg)" stroke-width="22" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M71.4,162.7 L83.2,110.9 L131.1,87.8"  fill="none" stroke="url(#hg)" stroke-width="22" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Dotted ring between adjacent nodes -->
  <!-- Nodes: Top(220,110) TR(306,151) R(327,245) BR(268,319) BL(172,319) L(113,245) TL(134,151) -->
  <line x1="220" y1="110" x2="306" y2="151" stroke="white" stroke-width="2.5" stroke-dasharray="6,9" stroke-opacity="0.45"/>
  <line x1="306" y1="151" x2="327" y2="245" stroke="white" stroke-width="2.5" stroke-dasharray="6,9" stroke-opacity="0.45"/>
  <line x1="327" y1="245" x2="268" y2="319" stroke="white" stroke-width="2.5" stroke-dasharray="6,9" stroke-opacity="0.45"/>
  <line x1="268" y1="319" x2="172" y2="319" stroke="white" stroke-width="2.5" stroke-dasharray="6,9" stroke-opacity="0.45"/>
  <line x1="172" y1="319" x2="113" y2="245" stroke="white" stroke-width="2.5" stroke-dasharray="6,9" stroke-opacity="0.45"/>
  <line x1="113" y1="245" x2="134" y2="151" stroke="white" stroke-width="2.5" stroke-dasharray="6,9" stroke-opacity="0.45"/>
  <line x1="134" y1="151" x2="220" y2="110" stroke="white" stroke-width="2.5" stroke-dasharray="6,9" stroke-opacity="0.45"/>

  <!-- Spokes: hub edge → node near edge -->
  <line x1="220"   y1="178"  x2="220"   y2="137"  stroke="white" stroke-width="9" stroke-linecap="round"/>
  <line x1="252.8" y1="193.7" x2="284.9" y2="167.9" stroke="white" stroke-width="9" stroke-linecap="round"/>
  <line x1="260.9" y1="229.6" x2="300.7" y2="238.8" stroke="white" stroke-width="9" stroke-linecap="round"/>
  <line x1="238.3" y1="257.8" x2="256.2" y2="294.7" stroke="white" stroke-width="9" stroke-linecap="round"/>
  <line x1="201.7" y1="257.8" x2="183.8" y2="294.7" stroke="white" stroke-width="9" stroke-linecap="round"/>
  <line x1="179.1" y1="229.6" x2="139.3" y2="238.8" stroke="white" stroke-width="9" stroke-linecap="round"/>
  <line x1="187.2" y1="193.7" x2="155.1" y2="167.9" stroke="white" stroke-width="9" stroke-linecap="round"/>

  <!-- Center hub -->
  <circle cx="220" cy="220" r="42" fill="white"/>
  <circle cx="220" cy="220" r="25" fill="#0A1628"/>

  <!-- Satellite nodes (white ring r=27, colored r=14) -->
  <circle cx="220" cy="110" r="27" fill="white"/><circle cx="220" cy="110" r="14" fill="#4EAEFF"/>
  <circle cx="306" cy="151" r="27" fill="white"/><circle cx="306" cy="151" r="14" fill="#4EAEFF"/>
  <circle cx="327" cy="245" r="27" fill="white"/><circle cx="327" cy="245" r="14" fill="#38D9A9"/>
  <circle cx="268" cy="319" r="27" fill="white"/><circle cx="268" cy="319" r="14" fill="#2EC4A0"/>
  <circle cx="172" cy="319" r="27" fill="white"/><circle cx="172" cy="319" r="14" fill="#7C5CF9"/>
  <circle cx="113" cy="245" r="27" fill="white"/><circle cx="113" cy="245" r="14" fill="#4EAEFF"/>
  <circle cx="134" cy="151" r="27" fill="white"/><circle cx="134" cy="151" r="14" fill="#4EAEFF"/>

</svg>
